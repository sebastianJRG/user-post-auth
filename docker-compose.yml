services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: userpostauth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    
    restart: unless-stopped

    ports:
      - "3000:3000"
    
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/userpostauth?schema=public"
      BCRYPT: 10
      PORT: 3000
    
    depends_on:
      - db

volumes:
  postgres_data: